# ===========================================================================
# scan_config_events.yaml
# DEDICATED config for the waiting-time / residence-time figures (Fig 5) and the
# GIFs (Fig 2). These need the heavy per-event logs and field-movie stacks, which
# you only want on a small g-subset and a few seeds — NOT on the full final scan.
#
# Run this into its OWN output root (out_return_home_events/) so it never mixes with
# the big aggregate scan in out_return_home/. Same model: return-home, delta=1/15,
# no kappa, no arrest.
#
#   python3 scripts/run_transition_scan.py --config config/scan_config_events.yaml \
#       --output-dir out_return_home_events --dry-run
#   python3 scripts/run_transition_scan.py --config config/scan_config_events.yaml \
#       --output-dir out_return_home_events
# ===========================================================================

model:
  dt: 0.01
  A0: 0.0333333333    # 1/30
  omega: 0.0666666667 # 1/15
  eta: 0.03
  theta: 5.6
  Gamma: 0.002

police:
  M_tot: 500.0
  eta_M: 0.1
  omega_M: 0.0666666667

removal:
  delta: 0.0666666667  # 1/15
  event_order: sequential

grid:
  L: 128
  g_values: [0.0, 1.0, 3.0]      # pre / transition / post — the 3 regimes
  seeds: [0, 1, 2, 3, 4]         # 5 seeds is plenty for waiting-time statistics
  T_max: 365

windows:
  burn_in_day: 185
  stationary_lo: 185
  stationary_hi: 365

output:
  save_summary: true
  save_daily: true
  save_fields: true
  snapshot_days: [final]
  snapshot_g: [0.0, 1.0, 3.0]
  movie_every: 2                 # save a field frame every 2 days -> GIFs
  movie_g: [0.0, 1.0, 3.0]
  save_event_logs: true          # per-event log -> waiting-time / residence analysis
  event_log_g: [0.0, 1.0, 3.0]
